name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o wrkmon-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/wrkmon-go
      - uses: actions/upload-artifact@v4
        with:
          name: wrkmon-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: wrkmon-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Build .deb packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for ARCH in amd64 arm64; do
            PKG="wrkmon-go_${VERSION}_${ARCH}"
            mkdir -p "${PKG}/DEBIAN" "${PKG}/usr/local/bin"
            cp "wrkmon-go-linux-${ARCH}" "${PKG}/usr/local/bin/wrkmon-go"
            chmod 755 "${PKG}/usr/local/bin/wrkmon-go"
            cat > "${PKG}/DEBIAN/control" << 'ENDCTRL'
          Package: wrkmon-go
          Version: VERSIONPLACEHOLDER
          Architecture: ARCHPLACEHOLDER
          Maintainer: Umar Khan <43144366+Umar-Khan-Yousafzai@users.noreply.github.com>
          Description: TUI YouTube audio player
           A terminal-based YouTube audio player built with Go and Bubble Tea.
           Search YouTube, manage queues, and play audio from your terminal.
          Depends: mpv
          Homepage: https://github.com/Umar-Khan-Yousafzai/wrkmon-go
          Section: sound
          Priority: optional
          ENDCTRL
            # Remove leading whitespace and fill placeholders
            sed -i 's/^          //' "${PKG}/DEBIAN/control"
            sed -i "s/VERSIONPLACEHOLDER/${VERSION}/" "${PKG}/DEBIAN/control"
            sed -i "s/ARCHPLACEHOLDER/${ARCH}/" "${PKG}/DEBIAN/control"
            dpkg-deb --build --root-owner-group "${PKG}"
          done

      - name: Create tarballs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for PAIR in linux:amd64 linux:arm64 darwin:amd64 darwin:arm64; do
            GOOS="${PAIR%%:*}"
            GOARCH="${PAIR##*:}"
            DIR="wrkmon-go_${VERSION}_${GOOS}_${GOARCH}"
            mkdir -p "${DIR}"
            cp "wrkmon-go-${GOOS}-${GOARCH}" "${DIR}/wrkmon-go"
            chmod 755 "${DIR}/wrkmon-go"
            cp scripts/install.sh scripts/uninstall.sh README.md "${DIR}/" 2>/dev/null || true
            tar czf "${DIR}.tar.gz" "${DIR}"
          done

      - name: Create Windows zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIR="wrkmon-go_${VERSION}_windows_amd64"
          mkdir -p "${DIR}"
          cp wrkmon-go-windows-amd64.exe "${DIR}/wrkmon-go.exe"
          cp scripts/install.ps1 scripts/uninstall.ps1 README.md "${DIR}/" 2>/dev/null || true
          zip -r "${DIR}.zip" "${DIR}"

      - name: List release files
        run: ls -la wrkmon-go-* *.deb *.tar.gz *.zip 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ### Linux (one-liner)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Umar-Khan-Yousafzai/wrkmon-go/main/scripts/install.sh | bash
            ```

            ### Linux (.deb — Ubuntu/Debian)
            ```bash
            sudo dpkg -i wrkmon-go_*.deb
            sudo apt-get install -f
            ```

            ### Windows (PowerShell)
            ```powershell
            irm https://raw.githubusercontent.com/Umar-Khan-Yousafzai/wrkmon-go/main/scripts/install.ps1 | iex
            ```

            ### macOS
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Umar-Khan-Yousafzai/wrkmon-go/main/scripts/install.sh | bash
            ```

            ### Requirements
            - **mpv** — audio playback engine
            - **yt-dlp** — YouTube stream resolver
          files: |
            wrkmon-go-*
            *.deb
            *.tar.gz
            *.zip
